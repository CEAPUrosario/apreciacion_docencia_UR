<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progreso de Encuestas - UR</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        /* Contenedor del lobito */
        .contenedor-lobo {
            position: relative;
            width: 300px;  
            height: 400px; 
            margin-bottom: 20px;
        }

        /* Lobito gris de fondo */
        .lobo-vacio {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Contenedor que recorta la imagen a color */
        .recorte-progreso {
            position: absolute;
            bottom: 0; 
            left: 0;
            width: 100%;
            height: 0%; /* Inicia en 0% y subirá dinámicamente */
            overflow: hidden;
            transition: height 0.8s ease-in-out;
        }

        /* Lobito a color al frente */
        .lobo-lleno {
            position: absolute;
            bottom: 0; 
            left: 0;
            width: 100%;
            height: 400px; /* Mismo tamaño que el contenedor principal */
            object-fit: contain;
        }

        /* Barra deslizante temporal de simulación */
        .controles {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <h1>Progreso de Evaluación Docente</h1>

    <div class="contenedor-lobo">
        <img src="lobito-gris.png" alt="Progreso vacío" class="lobo-vacio">
        
        <div class="recorte-progreso" id="loboProgreso">
            <img src="lobito-color.png" alt="Progreso lleno" class="lobo-lleno">
        </div>
    </div>

    <div class="controles">
        <label for="rango">Simular progreso: <span id="valorPorcentaje">0%</span></label>
        <input type="range" id="rango" min="0" max="100" value="0">
    </div>

    <script>
        const rango = document.getElementById('rango');
        const loboProgreso = document.getElementById('loboProgreso');
        const valorPorcentaje = document.getElementById('valorPorcentaje');

        rango.addEventListener('input', (e) => {
            const porc = e.target.value;
            loboProgreso.style.height = `${porc}%`;
            valorPorcentaje.textContent = `${porc}%`;
        });
    </script>
</body>
</html>
